name: Deploy to VM

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: [self-hosted, Linux, ARM64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build jar
        run: ./mvnw clean package

      - name: Deploy jar
        run: |
          sudo mkdir -p /opt/demo-metrics
          sudo cp target/demo-0.0.1-SNAPSHOT.jar /opt/demo-metrics/app.jar
          sudo systemctl restart demo-metrics
          sudo systemctl status demo-metrics --no-pager
